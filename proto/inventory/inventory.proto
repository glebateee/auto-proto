syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";

package inventory;

option go_package = "glebateee.ai.v1;aiv1";

service Inventory{
    rpc Health(HealthRequest) returns (HealthResponse);
    rpc ProductPageSize(ProductPageSizeRequest) returns (ProductPageSizeResponse);
    rpc ProductPageSizeCategory(ProductPageSizeCategoryRequest) returns (ProductPageSizeCategoryResponse);
    rpc ProductList(ProductListRequest) returns (ProductListResponse);
    rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);


}

// ######################################
// ##########      Health      ##########
// ######################################

message HealthRequest{
    string status = 1; 
}

message HealthResponse{
    string status = 1;
}

// ###############################################
// ##########      ProductPageSize      ##########
// ###############################################

message Product {
    int64 id = 1;
    string sku = 2;
    string name = 3;
    string description = 4;
    string category = 5;
    string manufacturer = 6;
    int64 weight = 7;
    int64 price = 8;
    int64 base_price = 9;
    int64 issue_year = 10;
    google.protobuf.Timestamp created_at = 11;
    google.protobuf.Timestamp updated_at = 12;
}

message ProductPageSizeRequest{
    int64 page = 1;
    int64 size = 2;
}

message ProductPageSizeResponse{
    repeated Product products = 1;
    int64 available = 2;
}

// #######################################################
// ##########      ProductPageSizeCategory      ##########
// #######################################################

message ProductPageSizeCategoryRequest{
    int64 page = 1;
    int64 size = 2;
    int64 category_id = 3;
}

message ProductPageSizeCategoryResponse{
    repeated Product products = 1;
    int64 available = 2;
}

// ###########################################
// ##########      ProductList      ##########
// ###########################################

message ProductListRequest{}

message ProductListResponse{
    repeated Product products = 1;
}

// #############################################
// ##########      UpdateProduct      ##########
// #############################################

message UpdateProductFields {
    string name = 1;
    string description = 2;
    string category = 3;
    string manufacturer = 4;
    int64 weight = 5;
    int64 price = 6;
    int64 base_price = 7;
    int64 issue_year = 8;
}

message UpdateProductRequest {
    string sku = 1;
    UpdateProductFields fields = 2;
    google.protobuf.FieldMask update_mask = 3;
}

message UpdateProductResponse {
    Product product = 1;
}