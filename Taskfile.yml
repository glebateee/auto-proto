# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
    PROTO_FILE: proto/inventory/inventory.proto
    OUT_FILE: ./gen/go

    COMMIT: '"added timestamps to product again"'
    TAG: 'v0.0.7'
    TAG_DESCRIPTION: '"added timestamps to product again"'

tasks:
  gen:
    desc: generates 
    cmds:
      - protoc -I 
        proto {{ .PROTO_FILE }} 
        --go_out={{ .OUT_FILE }} 
        --go_opt=paths=source_relative 
        --go-grpc_out={{ .OUT_FILE }} 
        --go-grpc_opt=paths=source_relative
  
  push:
    desc: pushes to git with commit and tag 
    cmds:
      - git commit -m {{ .COMMIT }}
      - git push origin main
      - git tag -a {{ .TAG }} -m {{ .TAG_DESCRIPTION }}
      - git push origin {{ .TAG }}

  default:
    desc: print list of available commands
    cmds:
      - task --list
    silent: true